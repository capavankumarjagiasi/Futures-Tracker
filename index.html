<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NSE F&O Tracker</title>
<link rel="manifest" href="manifest.json">
<style>
/* FORCE horizontal scroll */
.table-scroll {
  overflow-x: auto !important;
  -webkit-overflow-scrolling: touch;
  width: 100%;
  display: block;
  position: relative;
}
.table-scroll > .table-wrap {
  min-width: fit-content;
}
.table-scroll .table-header,
.table-scroll .table-row {
  min-width: max-content;
}

* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Segoe UI',system-ui,sans-serif; background:#1a1a2e; color:#e0e0e0; min-height:100vh; }
.header { background:#16213e; padding:12px 16px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid #2a2a4a; }
.header h1 { font-size:18px; color:#4fc3f7; font-weight:600; }
.sync-badge { font-size:11px; color:#81c784; background:#1b5e20; padding:3px 10px; border-radius:12px; }
.sync-badge.pending { color:#ffb74d; background:#5d4037; }
.sync-badge.error { color:#ef5350; background:#4a0000; }
.nav { display:flex; gap:8px; padding:12px 16px; overflow-x:auto; background:#16213e; border-bottom:1px solid #2a2a4a; }
.nav-btn { padding:8px 16px; border:none; border-radius:20px; background:#2a2a4a; color:#b0b0c0; font-size:13px; cursor:pointer; white-space:nowrap; transition:all 0.2s; }
.nav-btn:hover { background:#3a3a5a; }
.nav-btn.active { background:#4fc3f7; color:#1a1a2e; font-weight:600; }
.content { padding:16px; max-width:1200px; margin:0 auto; }
.section-title { font-size:13px; color:#888; text-transform:uppercase; letter-spacing:1px; margin:20px 0 10px; font-weight:600; }

/* Dashboard Cards */
.cards-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:12px; margin-bottom:20px; }
@media(min-width:768px){ .cards-grid { grid-template-columns:repeat(4,1fr); } }
.card { background:#16213e; border-radius:12px; padding:16px; text-align:center; border:1px solid #2a2a4a; transition:transform 0.2s; cursor:pointer; }
.card:hover { transform:translateY(-2px); border-color:#4fc3f7; }
.card-icon { font-size:28px; margin-bottom:6px; }
.card-count { font-size:32px; font-weight:700; color:#fff; }
.card-label { font-size:12px; color:#888; margin-top:4px; }
.card.lb .card-count { color:#27ae60; }
.card.sb .card-count { color:#ef5350; }
.card.lu .card-count { color:#e67e22; }
.card.sc .card-count { color:#3498db; }

/* Filters */
.filters { display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap; }
.filter-btn { padding:6px 14px; border:1px solid #2a2a4a; border-radius:16px; background:#16213e; color:#b0b0c0; font-size:12px; cursor:pointer; transition:all 0.2s; }
.filter-btn:hover { border-color:#4fc3f7; }
.filter-btn.active { background:#4fc3f7; color:#1a1a2e; border-color:#4fc3f7; font-weight:600; }

/* Tables */
.table-wrap { background:#16213e; border-radius:12px; overflow:hidden; border:1px solid #2a2a4a; }
.table-header { display:grid; padding:10px 12px; background:#0f3460; font-size:11px; color:#aaa; font-weight:600; text-transform:uppercase; letter-spacing:0.5px; }
.table-row { display:grid; padding:10px 12px; border-bottom:1px solid #2a2a4a; font-size:13px; align-items:center; }
.table-row:last-child { border-bottom:none; }
.table-row:hover { background:#1a1a3e; }
.col-symbol { font-weight:600; color:#4fc3f7; }
.col-signal { padding:3px 10px; border-radius:10px; font-size:11px; font-weight:600; text-align:center; }
.signal-LB { background:#27ae6020; color:#27ae60; }
.signal-SB { background:#ef535020; color:#ef5350; }
.signal-LU { background:#e67e2220; color:#e67e22; }
.signal-SC { background:#3498db20; color:#3498db; }
.col-basis { font-weight:600; }
.basis-pos { color:#66bb6a; }
.basis-neg { color:#ef5350; }
.col-oi { text-align:right; }
.col-oi .oi-chg { font-size:11px; }
.oi-up { color:#66bb6a; }
.oi-down { color:#ef5350; }
.col-price { text-align:right; }
.col-alerts { font-size:11px; }
.alert-tag { display:inline-block; padding:2px 6px; border-radius:4px; margin:1px; font-size:10px; }
.alert-hidisc { background:#ef535020; color:#ef5350; }
.alert-squeeze { background:#ff980020; color:#ff9800; }
.alert-bulltrap { background:#ff572220; color:#ff5722; }
.alert-oispike { background:#ffeb3b20; color:#ffeb3b; }
.alert-reshort { background:#9c27b020; color:#ce93d8; }
.alert-recovery { background:#00bcd420; color:#00bcd4; }

/* Basis Summary Bar */
.basis-bar { display:flex; height:36px; border-radius:8px; overflow:hidden; margin-bottom:20px; font-size:11px; font-weight:600; }
.basis-seg { display:flex; align-items:center; justify-content:center; color:#fff; min-width:60px; }
.basis-seg.dd { background:#c62828; }
.basis-seg.d { background:#ef6c00; }
.basis-seg.p { background:#546e7a; }
.basis-seg.pm { background:#0277bd; }
.basis-seg.dp { background:#2e7d32; }

/* Ban List */
.ban-item { display:flex; align-items:center; gap:12px; padding:10px 12px; background:#16213e; border-radius:8px; margin-bottom:6px; border:1px solid #2a2a4a; }
.ban-badge { background:#c62828; color:#fff; padding:3px 10px; border-radius:12px; font-size:11px; font-weight:600; }
.ban-symbol { font-weight:600; color:#ef5350; }
.ban-out { display:flex; align-items:center; gap:12px; padding:10px 12px; background:#16213e; border-radius:8px; margin-bottom:6px; border-left:3px solid #2e7d32; }
.ban-out-badge { background:#2e7d32; color:#fff; padding:3px 10px; border-radius:12px; font-size:11px; font-weight:600; }
.ban-out-symbol { font-weight:600; color:#66bb6a; }

/* Alerts List */
.alert-item { display:flex; align-items:center; gap:12px; padding:10px 12px; background:#16213e; border-radius:8px; margin-bottom:6px; border:1px solid #2a2a4a; }
.alert-icon { font-size:16px; }
.alert-symbol { font-weight:600; color:#4fc3f7; min-width:80px; }
.alert-text { font-size:13px; color:#ccc; }

/* Empty State */
.empty { text-align:center; padding:40px; color:#666; font-size:14px; }

/* Scrollbar */
::-webkit-scrollbar { width:6px; height:6px; }
::-webkit-scrollbar-track { background:#1a1a2e; }
::-webkit-scrollbar-thumb { background:#4a4a6a; border-radius:3px; }
::-webkit-scrollbar-thumb:hover { background:#5a5a7a; }

/* Loading */
.loading { text-align:center; padding:60px; color:#888; }
.spinner { width:40px; height:40px; border:3px solid #2a2a4a; border-top-color:#4fc3f7; border-radius:50%; animation:spin 1s linear infinite; margin:0 auto 16px; }
@keyframes spin { to { transform:rotate(360deg); } }

/* Search */
.search-box { width:100%; padding:10px 14px; background:#16213e; border:1px solid #2a2a4a; border-radius:8px; color:#e0e0e0; font-size:14px; margin-bottom:16px; }
.search-box:focus { outline:none; border-color:#4fc3f7; }
.search-box::placeholder { color:#666; }

/* Select */
.select-box { padding:8px 12px; background:#16213e; border:1px solid #2a2a4a; border-radius:8px; color:#e0e0e0; font-size:13px; margin-bottom:12px; }
.select-box:focus { outline:none; border-color:#4fc3f7; }

/* OI Tabs */
.oi-tabs { display:flex; gap:8px; margin-bottom:12px; }
.oi-tab { flex:1; padding:10px; border:none; border-radius:8px; background:#16213e; color:#b0b0c0; font-size:13px; font-weight:600; cursor:pointer; border:1px solid #2a2a4a; }
.oi-tab.active { background:#4fc3f7; color:#1a1a2e; }

/* Detail Modal */
.modal-overlay { display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.8); z-index:200; align-items:center; justify-content:center; padding:20px; }
.modal-overlay.active { display:flex; }
.modal-box { background:#16213e; border-radius:16px; max-width:500px; width:100%; max-height:90vh; overflow-y:auto; border:1px solid #2a2a4a; }
.modal-header { display:flex; align-items:center; justify-content:space-between; padding:16px; border-bottom:1px solid #2a2a4a; }
.modal-header h2 { font-size:18px; color:#4fc3f7; }
.modal-close { background:none; border:none; color:#888; font-size:24px; cursor:pointer; }
.modal-body { padding:16px; }
.detail-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:16px; }
.detail-item { background:#1a1a3e; border-radius:10px; padding:12px; }
.detail-label { font-size:11px; color:#888; margin-bottom:4px; }
.detail-value { font-size:18px; font-weight:700; }
.detail-signal { grid-column:1/-1; text-align:center; padding:14px; border-radius:12px; font-size:18px; font-weight:700; margin-bottom:8px; }

/* Manual refresh */
.refresh-bar { display:flex; gap:8px; align-items:center; margin-bottom:12px; flex-wrap:wrap; }
.refresh-btn { padding:8px 16px; background:#0f3460; color:#4fc3f7; border:1px solid #2a2a4a; border-radius:8px; font-size:12px; cursor:pointer; }
.refresh-btn:hover { background:#1a4a7a; }
.source-info { font-size:11px; color:#666; }


/* Table horizontal scrolling */
.table-scroll {
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  width: 100%;
}
.table-scroll::-webkit-scrollbar { height: 6px; }
.table-scroll::-webkit-scrollbar-track { background: #1a1a2e; }
.table-scroll::-webkit-scrollbar-thumb { background: #4a4a6a; border-radius: 3px; }

/* Filter pills for reports */
.filter-pills {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
  flex-wrap: wrap;
  align-items: center;
}
.filter-pill {
  padding: 6px 14px;
  border: 1px solid #2a2a4a;
  border-radius: 16px;
  background: #16213e;
  color: #b0b0c0;
  font-size: 12px;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}
.filter-pill:hover { border-color: #4fc3f7; }
.filter-pill.active { background: #4fc3f7; color: #1a1a2e; border-color: #4fc3f7; font-weight: 600; }

/* Pattern filter specific */
.pattern-filter, .alert-filter, .basis-filter {
  display: flex;
  gap: 6px;
  margin-bottom: 12px;
  flex-wrap: wrap;
}

/* Discount/Premium range filter */
.range-filter {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 12px;
  flex-wrap: wrap;
}
.range-filter label { font-size: 12px; color: #888; }
.range-filter input[type="range"] {
  flex: 1;
  min-width: 120px;
  accent-color: #4fc3f7;
}
.range-filter .range-value {
  font-size: 12px;
  color: #4fc3f7;
  font-weight: 600;
  min-width: 40px;
  text-align: right;
}


/* Sticky table header */
.table-wrap .table-header {
  position: sticky;
  top: 0;
  z-index: 50;
  background: #0f3460;
}
.table-scroll {
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  width: 100%;
  position: relative;
}
.table-scroll::-webkit-scrollbar { height: 6px; }
.table-scroll::-webkit-scrollbar-track { background: #1a1a2e; }
.table-scroll::-webkit-scrollbar-thumb { background: #4a4a6a; border-radius: 3px; }

/* Responsive */
@media(max-width:600px){
  .table-header, .table-row { font-size:11px; padding:8px 6px; }
  .col-symbol { font-size:12px; }
  .card-count { font-size:24px; }
}
</style>
</head>
<body>
<div class="header">
  <h1>📊 NSE F&O Tracker</h1>
  <span class="sync-badge pending" id="syncBadge">⏳ Loading...</span>
</div>
<div class="nav">
  <button class="nav-btn active" onclick="showTab('dashboard')">📈 Dashboard</button>
  <button class="nav-btn" onclick="showTab('tracker')">🔍 Tracker</button>
  <button class="nav-btn" onclick="showTab('oi')">🔥 OI Movers</button>
  <button class="nav-btn" onclick="showTab('basis')">⚖️ Basis</button>
  <button class="nav-btn" onclick="showTab('ban')">🚫 Ban List</button>
</div>
<div class="content" id="content">
  <div class="loading"><div class="spinner"></div>Loading data...</div>
</div>

<!-- Detail Modal -->
<div class="modal-overlay" id="detailModal" onclick="if(event.target===this)closeModal()">
  <div class="modal-box">
    <div class="modal-header">
      <h2 id="modalSymbol">Symbol</h2>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script>
// ============================================
// CONFIGURATION - EDIT THESE URLS
// ============================================
const CONFIG = {
  // PRIMARY: GitHub raw URL (RECOMMENDED - same domain, no CORS, no API keys)
  // Replace with your actual raw GitHub URL after pushing JSON to repo
  githubRawUrl: 'https://raw.githubusercontent.com/capavankumarjagiasi/Futures-Tracker/main/fo_snapshot.json',
  
  // FALLBACK: jsonbin.io (if you prefer external hosting)
  // Replace YOUR_BIN_ID with your actual bin ID
  jsonbinUrl: 'https://api.jsonbin.io/v3/b/YOUR_BIN_ID/latest',
  
  // Set to 'github' or 'jsonbin' to choose primary source
  primarySource: 'github',
  
  // Date for display fallback
  dateFmt: '05-06-2026'
};

// ============================================
// STATE
// ============================================
let appData = null;
let currentTab = 'dashboard';
let dashboardFilter = 'all';

// Sort state: { tab: { column: string, direction: 'asc'|'desc' } }
let sortState = {};

function getSortKey(tab) {
  return sortState[tab] || { column: null, direction: 'asc' };
}

function setSortKey(tab, column) {
  const current = getSortKey(tab);
  if (current.column === column) {
    sortState[tab] = { column: column, direction: current.direction === 'asc' ? 'desc' : 'asc' };
  } else {
    sortState[tab] = { column: column, direction: 'asc' };
  }
  render(); // re-render with sort
}

function sortData(data, tab, column, direction) {
  if (!column) return data;
  const sorted = [...data];
  sorted.sort((a, b) => {
    let av, bv;
    switch(column) {
      case 'symbol': av = a.symbol; bv = b.symbol; break;
      case 'signal': av = a.signal; bv = b.signal; break;
      case 'conv': av = a.conv_score !== null ? a.conv_score : -1; bv = b.conv_score !== null ? b.conv_score : -1; break;
      case 'basis': av = a.basis_pct !== null ? a.basis_pct : 0; bv = b.basis_pct !== null ? b.basis_pct : 0; break;
      case 'ltp': av = a.ltp !== null ? a.ltp : 0; bv = b.ltp !== null ? b.ltp : 0; break;
      case 'oi': av = a.oi !== null ? a.oi : 0; bv = b.oi !== null ? b.oi : 0; break;
      case 'oichg': av = a.oi_chg !== null ? a.oi_chg : 0; bv = b.oi_chg !== null ? b.oi_chg : 0; break;
      case 'spot': av = a.spot !== null ? a.spot : 0; bv = b.spot !== null ? b.spot : 0; break;
      case 'oipct': av = a.oi_5d_pct !== null ? a.oi_5d_pct : 0; bv = b.oi_5d_pct !== null ? b.oi_5d_pct : 0; break;
      case 'pricechg': av = a.price_chg !== null ? a.price_chg : 0; bv = b.price_chg !== null ? b.price_chg : 0; break;
      case 'fvdiff': av = a.fv_diff !== null ? a.fv_diff : 0; bv = b.fv_diff !== null ? b.fv_diff : 0; break;
      case 'basis_abs': av = a.basis !== null ? a.basis : 0; bv = b.basis !== null ? b.basis : 0; break;
      case 'expiry': av = a.expiry || 'Near'; bv = b.expiry || 'Near'; break;
      default: av = 0; bv = 0;
    }
    if (typeof av === 'string') {
      return direction === 'asc' ? av.localeCompare(bv) : bv.localeCompare(av);
    }
    return direction === 'asc' ? av - bv : bv - av;
  });
  return sorted;
}

function sortIndicator(column, tab) {
  const s = getSortKey(tab);
  if (s.column !== column) return '';
  return s.direction === 'asc' ? ' ▲' : ' ▼';
}

// ============================================
// DATA LOADING - NO GOOGLE DRIVE / NO OAUTH
// ============================================
async function loadData() {
  const badge = document.getElementById('syncBadge');
  badge.className = 'sync-badge pending';
  badge.textContent = '⏳ Loading...';

  try {
    let data = null;
    let source = '';
    let errors = [];

    // 1. Try localStorage cache first for instant display
    const cached = localStorage.getItem('fo_snapshot_cache');
    const cachedTime = localStorage.getItem('fo_snapshot_time');
    if (cached) {
      try {
        data = JSON.parse(cached);
        source = 'cache';
        appData = processData(data);
        render();
      } catch(e) { console.log('Cache parse failed'); }
    }

    // 2. Fetch fresh data from primary source
    const urlsToTry = [];
    if (CONFIG.primarySource === 'github') {
      urlsToTry.push({ url: CONFIG.githubRawUrl + '?t=' + Date.now(), name: 'GitHub' });
      urlsToTry.push({ url: CONFIG.jsonbinUrl, name: 'jsonbin' });
    } else {
      urlsToTry.push({ url: CONFIG.jsonbinUrl, name: 'jsonbin' });
      urlsToTry.push({ url: CONFIG.githubRawUrl + '?t=' + Date.now(), name: 'GitHub' });
    }

    for (const src of urlsToTry) {
      if (data && source === 'live') break; // Already got live data
      try {
        console.log('Trying:', src.name, src.url);
        const resp = await fetch(src.url, { 
          cache: 'no-store',
          headers: src.name === 'jsonbin' ? { 'X-Master-Key': '' } : {} // Add jsonbin key if needed
        });
        if (resp.ok) {
          let raw = await resp.json();
          // jsonbin.io wraps data in { record: {...}, metadata: {...} }
          if (src.name === 'jsonbin' && raw.record) raw = raw.record;
          data = raw;
          source = 'live';
          localStorage.setItem('fo_snapshot_cache', JSON.stringify(data));
          localStorage.setItem('fo_snapshot_time', new Date().toISOString());
          console.log('Loaded from:', src.name);
          break;
        } else {
          errors.push(`${src.name}: HTTP ${resp.status}`);
        }
      } catch(e) {
        errors.push(`${src.name}: ${e.message}`);
        console.log(src.name, 'failed:', e.message);
      }
    }

    if (!data && !appData) {
      throw new Error('No data available from any source. Errors: ' + errors.join('; '));
    }

    if (data) {
      appData = processData(data);
    }

    badge.className = 'sync-badge';
    const srcLabel = source === 'cache' ? 'Cached' : (CONFIG.primarySource === 'github' ? 'GitHub' : 'jsonbin');
    badge.textContent = '✅ ' + srcLabel + ' ' + (appData?.meta?.date_fmt || CONFIG.dateFmt);
    render();

  } catch(err) {
    console.error('Load error:', err);
    badge.className = 'sync-badge error';
    badge.textContent = '❌ Failed';
    if (!appData) {
      document.getElementById('content').innerHTML = `
        <div class="empty">
          <div style="font-size:48px;margin-bottom:16px;">📂</div>
          <p>Unable to load data.</p>
          <p style="color:#666;margin-top:8px;">Please ensure data file is accessible.</p>
          <p style="color:#666;margin-top:8px;font-size:12px;">${err.message}</p>
          <div style="margin-top:16px;">
            <button class="refresh-btn" onclick="loadData()">🔄 Retry</button>
          </div>
        </div>`;
    }
  }
}

// ============================================
// DATA PROCESSING
// ============================================
function processData(raw) {
  const tracker = raw.futures_tracker || [];

  // Compute signal counts from futures_tracker (NOT signal_breakdown which is limited)
  const signalCounts = { LB:0, SB:0, LU:0, SC:0 };
  const signalItems = { LB:[], SB:[], LU:[], SC:[] };

  tracker.forEach(item => {
    const sig = item.signal;
    if (signalCounts.hasOwnProperty(sig)) {
      signalCounts[sig]++;
      signalItems[sig].push(item);
    }
  });

  // Categorize basis
  const basisCats = { dd:[], d:[], p:[], pm:[], dp:[] };
  tracker.forEach(item => {
    const bp = item.basis_pct;
    if (bp === null || bp === undefined) return;
    if (bp < -1) basisCats.dd.push(item);
    else if (bp < 0) basisCats.d.push(item);
    else if (bp === 0) basisCats.p.push(item);
    else if (bp <= 1) basisCats.pm.push(item);
    else basisCats.dp.push(item);
  });

  // Extract alerts
  const alerts = [];
  tracker.forEach(item => {
    if (item.alerts && item.alerts.trim()) {
      const alertList = item.alerts.split('|').map(a => a.trim()).filter(Boolean);
      alertList.forEach(a => alerts.push({ symbol: item.symbol, alert: a, signal: item.signal }));
    }
  });
  // Sort: Hi Disc first, then by symbol
  const alertPriority = { '🔻Hi Disc': 0, '⚡OI Spike': 1, '🚀Squeeze': 2, '⚠Bull Trap': 3, '🔄Rev↓': 4, '🔄Rev↑': 5 };
  alerts.sort((a, b) => {
    const pa = alertPriority[a.alert] ?? 99;
    const pb = alertPriority[b.alert] ?? 99;
    return pa - pb || a.symbol.localeCompare(b.symbol);
  });

  // Ban list - from futures_tracker where ban_status is 'banned'
  const banList = tracker.filter(i => i.ban_status === 'banned');

  return {
    meta: raw.meta || {},
    tracker,
    signalCounts,
    signalItems,
    basisCats,
    basisSummary: raw.basis_summary || [],
    oiMovers: raw.oi_movers || { gainers:[], losers:[] },
    alerts,
    banList
  };
}

// ============================================
// RENDERING
// ============================================
function render() {
  if (!appData) return;
  const el = document.getElementById('content');

  switch(currentTab) {
    case 'dashboard': renderDashboard(el); break;
    case 'tracker': renderTracker(el); break;
    case 'oi': renderOI(el); break;
    case 'basis': renderBasis(el); break;
    case 'ban': renderBan(el); break;
  }
}

function renderDashboard(el) {
  const { signalCounts, basisCats, alerts, banList } = appData;
  const total = signalCounts.LB + signalCounts.SB + signalCounts.LU + signalCounts.SC;

  // Filter items for display
  let displayItems = [];
  if (dashboardFilter === 'all') {

// ============================================
// HELPERS
// ============================================
function formatNumber(n) {
  if (n === null || n === undefined) return '-';
  if (Math.abs(n) >= 10000000) return (n/10000000).toFixed(1) + 'Cr';
  if (Math.abs(n) >= 100000) return (n/100000).toFixed(1) + 'L';
  if (Math.abs(n) >= 1000) return (n/1000).toFixed(1) + 'K';
  return n.toString();
}

function renderAlerts(alerts, pattern) {
  let html = '';
  if (pattern && pattern !== '↓→▼→▲' && pattern !== '↑→▼→↓' && pattern !== '▼→▲→▼' && 
      pattern !== 'SC×2' && pattern !== 'LB×2' && pattern !== 'LU×2' && pattern !== 'SB×2' &&
      pattern !== '▲→▲→↑' && pattern !== '▼→▼→↓' && pattern !== '↑→↑→↓' && pattern !== '↓→↓→↑') {
    html += `<span style="color:#888;margin-right:4px;">${pattern}</span>`;
  }
  if (alerts && alerts.trim()) {
    const list = alerts.split('|').map(a => a.trim()).filter(Boolean);
    list.forEach(a => {
      html += `<span class="alert-tag ${getAlertClass(a)}">${a}</span>`;
    });
  }
  return html || '-';
}

function getAlertClass(alert) {
  if (alert.includes('Hi Disc')) return 'alert-hidisc';
  if (alert.includes('Squeeze')) return 'alert-squeeze';
  if (alert.includes('Bull Trap')) return 'alert-bulltrap';
  if (alert.includes('OI Spike')) return 'alert-oispike';
  if (alert.includes('Rev↓') || alert.includes('Re-Short')) return 'alert-reshort';
  if (alert.includes('Rev↑') || alert.includes('Recovery')) return 'alert-recovery';
  return 'alert-tag';
}

// ============================================
// DASHBOARD FILTERS
// ============================================
let dashPattern = 'all';
let oiChgVisible = false;

function setDashPattern(pattern) {
  dashPattern = pattern;
  document.querySelectorAll('#dashPatternFilter .filter-pill').forEach(btn => {
    const btnText = btn.textContent.replace(/[🚀⚠⚡🔻🔄]/g, '').trim().toLowerCase();
    const patMap = { 'all': 'all', 'squeeze': 'squeeze', 'bull': 'bull trap', 'spike': 'oi spike', 'hidisc': 'hi disc', 'rev': 'reversal' };
    btn.classList.toggle('active', btnText === patMap[pattern]);
  });
  applyDashFilters();
}

function toggleOIChg() {
  oiChgVisible = !oiChgVisible;
  const btn = document.getElementById('oiToggleBtn');
  if (btn) btn.textContent = 'OI Chg: ' + (oiChgVisible ? 'ON' : 'OFF');
  if (btn) btn.classList.toggle('active', oiChgVisible);

  // Re-render dashboard to show/hide OI Chg column
  renderDashboard(document.getElementById('content'));
}

function applyDashFilters() {
  document.querySelectorAll('.dash-row').forEach(row => {
    const pattern = row.getAttribute('data-pattern') || '';
    const alerts = row.getAttribute('data-alerts') || '';
    let show = true;
    if (dashPattern !== 'all') {
      const patMap = { 'squeeze': 'squeeze', 'bull': 'bull trap', 'spike': 'oi spike', 'hidisc': 'hi disc', 'rev': 'reversal' };
      const searchTerm = patMap[dashPattern];
      if (!pattern.includes(searchTerm) && !alerts.includes(searchTerm)) show = false;
    }
    row.style.display = show ? '' : 'none';
  });
}

function setTrackerExpiry(expiry) {

function setTrackerBasis(cat) {
  trackerBasisCat = cat;
  const map = { 'all': 'All', 'dd': 'Deep Disc', 'd': 'Discount', 'p': 'Parity', 'pm': 'Premium', 'dp': 'Deep Prem' };
  document.querySelectorAll('#basisFilter .filter-pill').forEach(btn => {

function applyTrackerFilters() {
  document.querySelectorAll('.tracker-row').forEach(row => {
    const signal = row.getAttribute('data-signal');
    const alerts = row.getAttribute('data-alerts') || '';
    const basisCat = row.getAttribute('data-basiscat') || 'p';
    const expiry = row.getAttribute('data-expiry') || 'Near';

    let show = true;
    if (trackerPattern !== 'all' && signal !== trackerPattern) show = false;
    if (trackerAlert !== 'all' && !alerts.includes(trackerAlert.toLowerCase())) show = false;
    if (trackerExpiry !== 'all' && expiry !== trackerExpiry) show = false;
    if (trackerBasisCat !== 'all' && basisCat !== trackerBasisCat) show = false;
    row.style.display = show ? '' : 'none';
  });
}
